name: release-plz

on:
  push:
    branches: [main]

# only one release-plz run at a time so concurrent pushes don't race
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # publishes unreleased versions (runs when the release PR gets merged,
  # or when versions in Cargo.toml change directly on main)
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    # crates-io environment scopes CARGO_REGISTRY_TOKEN to this job only.
    # recommended protection rule: deployment branches = main
    environment: crates-io
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # opens or updates the release pull request with version bumps and
  # changelog entries from conventional commits since the last release.
  # does not need CARGO_REGISTRY_TOKEN - only opens PRs, doesn't publish
  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
